          <text x="150" y="0" fill="#1e1c1a">2× MacBook Pro · capitalized</text>
          <text x="620" y="0" fill="#54514c">1510 IT Equipment</text>
          <text x="900" y="0" fill="#1e1c1a" text-anchor="end">17,400</text>
