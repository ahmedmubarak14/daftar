<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" width="1600" height="1000" font-family="-apple-system, Inter, 'SF Pro', system-ui, sans-serif">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff5a1f"/><stop offset="1" stop-color="#c83512"/>
    </linearGradient>
    <filter id="soft" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="8"/><feComponentTransfer><feFuncA type="linear" slope="0.12"/></feComponentTransfer>
      <feComposite in2="SourceGraphic" operator="over"/>
    </filter>
  </defs>
  <!-- Browser frame -->
  <rect width="1600" height="1000" rx="18" fill="#f5f4f0"/>
  <rect x="20" y="20" width="1560" height="960" rx="14" fill="#ffffff" stroke="#ececea"/>
  <!-- Window chrome -->
  <rect x="20" y="20" width="1560" height="44" rx="14" fill="#faf9f6" stroke="#ececea"/>
  <circle cx="46" cy="42" r="6" fill="#ff6b6b"/><circle cx="68" cy="42" r="6" fill="#ffb24a"/><circle cx="90" cy="42" r="6" fill="#44c06a"/>
  <rect x="680" y="30" width="340" height="24" rx="8" fill="#ffffff" stroke="#ececea"/>
  <text x="850" y="46" font-size="12" fill="#87847c" text-anchor="middle">ahmedmubarak14.github.io/daftar/dashboard</text>

  <!-- Sidebar -->
  <rect x="20" y="64" width="240" height="916" fill="#faf9f6"/>
  <g transform="translate(36,92)">
