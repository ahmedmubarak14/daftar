          <text x="620" y="0" fill="#54514c">4100 Revenue</text>
          <text x="900" y="0" fill="#1e1c1a" text-anchor="end">18,750</text>
          <text x="1080" y="0" fill="#54514c" text-anchor="end">18,750</text>
          <text x="1180" y="0" fill="#c83512" font-size="11" text-anchor="end" font-weight="600">Why?</text>
        </g>
