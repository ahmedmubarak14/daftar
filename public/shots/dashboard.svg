    <text x="16" y="22" font-size="16" fill="#fff" text-anchor="middle" font-weight="700">د</text>
    <text x="48" y="22" font-size="17" fill="#1e1c1a" font-weight="600">Daftar</text>
  </g>
  <g transform="translate(36,150)" font-size="13" fill="#54514c">
    <rect width="208" height="36" rx="9" fill="#ffffff" stroke="#ececea"/>
    <text x="18" y="22" fill="#1e1c1a" font-weight="600">Dashboard</text>
    <text x="18" y="74">Guided Setup</text>
    <text x="18" y="116">Log</text>
    <text x="18" y="158">Ledger</text>
    <text x="18" y="200">Compliance</text>
    <text x="18" y="242">Reports</text>
    <text x="18" y="284">Glossary</text>
  </g>

  <!-- Main content -->
  <g transform="translate(290,92)">
    <text font-size="13" fill="#87847c" font-weight="600" letter-spacing="2">MITHAQ TECHNOLOGIES LLC</text>
    <text y="36" font-size="26" fill="#1e1c1a" font-weight="600">Here's where things stand</text>
    <g transform="translate(760,6)">
      <rect width="168" height="28" rx="14" fill="#ecfdf5" stroke="#a7f3d0"/>
      <circle cx="18" cy="14" r="5" fill="#10b981"/>
      <text x="34" y="19" font-size="12" fill="#047857">Not VAT-registered</text>
